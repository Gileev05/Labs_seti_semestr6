<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title> Трансформация и анимация</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="http://d3js.org/d3.v7.min.js"> </script>
    <script src="JavaScript/main.js"></script>
    <script src="JavaScript/image.js"></script>
    <script src="JavaScript/path.js"></script>
</head>
<body>

<form id="setting">
    <p id="coordsBlock">Координаты рисунка<br>
        <label for="cx">x: </label>
        <input type="number" id="cx" value="300" max="600" min="0"> <span class="to-hint">до</span>
        <input type="number" id="cx_finish" value="300" max="600" min="0"><br>
        <label for="cy">y: </label>
        <input type="number" id="cy" value="300" max="600" min="0"> <span class="to-hint">до</span>
        <input type="number" id="cy_finish" value="300" max="600" min="0">
    </p>
    <p id="pathBlock" style="display: none;">Пути перемещения<br>
        <select id="pathType" name="pathType">
            <option value="g">Буквой «Г»</option>
            <option value="circle">По кругу</option>
        </select>
    </p>
    <p id="scaleBlock">Масштаб<br>
        <label for="sx">по x: </label>
        <input type="number" id="sx" value="1" max="50" min="0"> <span class="to-hint">до</span>
        <input type="number" id="to_sx" value="1" max="50" min="0"><br>
        <label for="sy">по y: </label>
        <input type="number" id="sy" value="1" max="50" min="0"> <span class="to-hint">до</span>
        <input type="number" id="to_sy" value="1" max="50" min="0">
    </p>
    <p id="rotateBlock">Поворот<br>
        <label for="rad">угол: </label>
        <input type="number" id="rad" value="0" max="360" min="0"> <span class="to-hint">до</span>
        <input type="number" id="to_ad" value="0" max="360" min="0"><br>
    </p>
    <br>
    <p>
        <input type="button" id="draw" value="Нарисовать">
        <input type="button" id="clear" value="Очистить">
    </p>
    <br>
    <input type="checkbox" id="animate">
    <label for="animate">Включить анимацию?</label>
    <select id="easeType" name="easeType">
        <option value="linear">linear</option>
        <option value="elastic">elastic</option>
        <option value="bounce">bounce</option>
    </select>
    <br>
    <input type="checkbox" id="pathMove" style="display: none;">
    <label for="pathMove">Перемещение вдоль пути?</label>
    <br>
    <input type="button" id="animateBtn" value="Анимировать" style="display: none;">
</form>

<svg></svg>

</body>
</html>
